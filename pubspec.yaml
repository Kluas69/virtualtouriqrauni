name: virtualtouriu
description: A Flutter-based virtual tour application for Iqra University Islamabad Campus.
publish_to: "none" # Remove this if you plan to publish to pub.dev in the future

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.5

  # Navigation & Routing
  get: ^4.7.2

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Animations
  animate_do: ^4.2.0
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1

  # Layout & Scrolling
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^2.0.1

  # Panorama & 360° View
  panorama: ^0.4.1

  cached_network_image: ^3.3.1

  # Storage
  shared_preferences: ^2.2.3

  http: ^1.1.0

  # WebView (Cross-platform)
  webview_flutter: ^4.4.2
  webview_flutter_web: ^0.2.2+3 # Required for web support

  # Web APIs (replaces dart:html)
  web: ^1.1.0

  # Optional: Alternative webview (if you prefer inappwebview)
  # flutter_inappwebview: ^5.7.0  # Currently commented — choose one webview solution

  # HTML Rendering (for web content if needed)
  flutter_html: ^3.0.0-beta.2

  # Math utilities
  vector_math: ^2.1.4

  # Visibility detection
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # Consolidated Assets Configuration
  assets:
    # Data files
    - assets/app_data.json
    
    # Main images directory (includes all location images)
    - lib/images/
    
    # Panorama images directory
    - lib/images/panoramas/
    
    # 3D Models
    - assets/models/
