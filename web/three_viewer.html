<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Roboto', sans-serif;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
        }
        
        #progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }
        
        #progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        #controls-hint.visible {
            opacity: 1;
        }
        
        #error-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            text-align: center;
            padding: 40px;
        }
        
        #error-screen.visible {
            display: flex;
        }
        
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .error-message {
            font-size: 16px;
            opacity: 0.8;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">Loading 3D Model...</div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>
    
    <div id="controls-hint">
        <strong>Controls:</strong> WASD to move • Mouse to look around • Shift to run
    </div>
    
    <div id="error-screen">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Failed to Load Model</div>
        <div class="error-message" id="error-message"></div>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    
    <script>
        // ========================================
        // Enhanced WebGL Detection and Renderer Creation
        // ========================================
        function detectWebGLSupport() {
            try {
                const canvas = document.createElement('canvas');
                
                // Try WebGL 2.0 first (best performance)
                let context = canvas.getContext('webgl2');
                if (context) {
                    console.log('WebGL 2.0 support detected');
                    return true;
                }
                
                // Try standard WebGL 1.0
                context = canvas.getContext('webgl');
                if (context) {
                    console.log('WebGL 1.0 support detected');
                    return true;
                }
                
                // Try experimental WebGL (older browsers)
                context = canvas.getContext('experimental-webgl');
                if (context) {
                    console.log('Experimental WebGL support detected');
                    return true;
                }
                
                console.warn('No WebGL support detected');
                return false;
            } catch (e) {
                console.error('WebGL detection failed:', e);
                // CRITICAL: Return true to allow Three.js to attempt initialization
                console.log('Allowing Three.js to attempt WebGL initialization despite detection failure');
                return true;
            }
        }
        
        function createWebGLRenderer() {
            const rendererOptions = {
                antialias: PERFORMANCE_CONFIG.antialias,
                alpha: true,
                powerPreference: shouldOptimizeForMobile ? "low-power" : "high-performance",
                failIfMajorPerformanceCaveat: false, // Allow fallback rendering
                preserveDrawingBuffer: false, // Better memory management
                stencil: false, // Disable stencil buffer for performance
            };
            
            // Progressive fallback strategy
            const fallbackStrategies = [
                // Strategy 1: WebGL 2.0 with full options
                () => {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('webgl2', rendererOptions);
                    if (context) {
                        const renderer = new THREE.WebGLRenderer({ 
                            canvas: canvas,
                            context: context,
                            ...rendererOptions
                        });
                        console.log('WebGL 2.0 renderer created successfully');
                        return renderer;
                    }
                    return null;
                },
                
                // Strategy 2: WebGL 1.0 with full options
                () => {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('webgl', rendererOptions) || 
                                   canvas.getContext('experimental-webgl', rendererOptions);
                    if (context) {
                        const renderer = new THREE.WebGLRenderer({ 
                            canvas: canvas,
                            context: context,
                            ...rendererOptions
                        });
                        console.log('WebGL 1.0 renderer created successfully');
                        return renderer;
                    }
                    return null;
                },
                
                // Strategy 3: WebGL 2.0 with reduced options
                () => {
                    const reducedOptions = {
                        ...rendererOptions,
                        antialias: false,
                        powerPreference: "low-power",
                    };
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('webgl2', reducedOptions);
                    if (context) {
                        const renderer = new THREE.WebGLRenderer({ 
                            canvas: canvas,
                            context: context,
                            ...reducedOptions
                        });
                        console.log('WebGL 2.0 renderer created with reduced options');
                        return renderer;
                    }
                    return null;
                },
                
                // Strategy 4: WebGL 1.0 with reduced options
                () => {
                    const reducedOptions = {
                        ...rendererOptions,
                        antialias: false,
                        powerPreference: "low-power",
                        alpha: false,
                    };
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('webgl', reducedOptions) || 
                                   canvas.getContext('experimental-webgl', reducedOptions);
                    if (context) {
                        const renderer = new THREE.WebGLRenderer({ 
                            canvas: canvas,
                            context: context,
                            ...reducedOptions
                        });
                        console.log('WebGL 1.0 renderer created with reduced options');
                        return renderer;
                    }
                    return null;
                },
                
                // Strategy 5: Let Three.js handle context creation (last resort)
                () => {
                    try {
                        const minimalOptions = {
                            antialias: false,
                            alpha: false,
                            powerPreference: "low-power",
                            failIfMajorPerformanceCaveat: false,
                        };
                        const renderer = new THREE.WebGLRenderer(minimalOptions);
                        console.log('Three.js managed WebGL renderer created (minimal options)');
                        return renderer;
                    } catch (e) {
                        console.error('Three.js managed renderer creation failed:', e);
                        return null;
                    }
                }
            ];
            
            // Try each fallback strategy
            for (let i = 0; i < fallbackStrategies.length; i++) {
                try {
                    const renderer = fallbackStrategies[i]();
                    if (renderer) {
                        setupRenderer(renderer);
                        
                        // Notify Flutter about successful renderer creation
                        window.parent.postMessage({
                            type: 'rendererCreated',
                            strategy: i + 1,
                            totalStrategies: fallbackStrategies.length,
                            timestamp: Date.now()
                        }, '*');
                        
                        return renderer;
                    }
                } catch (e) {
                    console.warn(`Renderer creation strategy ${i + 1} failed:`, e);
                }
            }
            
            console.error('All WebGL renderer creation strategies failed');
            
            // Notify Flutter about renderer creation failure
            window.parent.postMessage({
                type: 'rendererCreationFailed',
                timestamp: Date.now(),
                reason: 'All fallback strategies exhausted'
            }, '*');
            
            return null;
        }
        
        function setupRenderer(renderer) {
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(PERFORMANCE_CONFIG.pixelRatio);
            
            // Conditional shadow settings
            if (!shouldOptimizeForMobile) {
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            }
            
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            
            // Memory management for mobile
            if (shouldOptimizeForMobile) {
                renderer.info.autoReset = true;
                renderer.setAnimationLoop(null); // Use manual animation loop for better control
            }
            
            const container = document.getElementById('canvas-container');
            container.appendChild(renderer.domElement);
        }
        
        // ========================================
        // STEP 1: Scene Setup & Mobile Detection
        // ========================================
        let scene, camera, renderer, controls;
        let model, mixer, clock;
        let moveForward = false, moveBackward = false;
        let moveLeft = false, moveRight = false;
        let canJump = false;
        let prevTime = performance.now();
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const WALK_SPEED = 100.0;
        const RUN_SPEED = 200.0;
        let isRunning = false;
        
        // Mobile optimization flags
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isLowEndDevice = navigator.hardwareConcurrency <= 2 || navigator.deviceMemory <= 2;
        const shouldOptimizeForMobile = isMobile || isLowEndDevice;
        
        // Performance settings based on device
        const PERFORMANCE_CONFIG = {
            pixelRatio: shouldOptimizeForMobile ? Math.min(window.devicePixelRatio, 1.5) : window.devicePixelRatio,
            shadowMapSize: shouldOptimizeForMobile ? 512 : 2048,
            antialias: !shouldOptimizeForMobile,
            maxLights: shouldOptimizeForMobile ? 2 : 4,
            modelScale: shouldOptimizeForMobile ? 0.8 : 1.0,
            fogDistance: shouldOptimizeForMobile ? 500 : 750,
        };
        
        // ========================================
        // STEP 2: Initialize Scene with Enhanced WebGL Detection
        // ========================================
        function init() {
            const container = document.getElementById('canvas-container');
            
            // Enhanced WebGL detection with multiple fallback methods
            if (!detectWebGLSupport()) {
                showError('WebGL is not supported on this device. Please try using a different browser or update your graphics drivers.');
                return;
            }
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.fog = new THREE.Fog(0x87CEEB, 0, PERFORMANCE_CONFIG.fogDistance);
            
            // Camera
            camera = new THREE.PerspectiveCamera(
                75, 
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.set(0, 1.6, 5); // Human eye height
            
            // Renderer with enhanced WebGL context creation
            renderer = createWebGLRenderer();
            if (!renderer) {
                showError('Failed to create WebGL renderer. Your device may not support WebGL or may be running low on memory.');
                return;
            }
            
            container.appendChild(renderer.domElement);
            
            // Clock for animations
            clock = new THREE.Clock();
            
            // Add performance monitoring
            if (shouldOptimizeForMobile) {
                setupPerformanceMonitoring();
            }
            
            // ========================================
            // STEP 3: Lighting with Mobile Optimization
            // ========================================
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            // Reduce lighting complexity on mobile
            if (shouldOptimizeForMobile) {
                // Single directional light for mobile
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 10, 7.5);
                // No shadows on mobile for performance
                scene.add(dirLight);
                
                // Simple hemisphere light
                const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x444444, 0.4);
                scene.add(hemiLight);
            } else {
                // Full lighting setup for desktop
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 10, 7.5);
                dirLight.castShadow = true;
                dirLight.shadow.camera.right = 20;
                dirLight.shadow.camera.left = -20;
                dirLight.shadow.camera.top = 20;
                dirLight.shadow.camera.bottom = -20;
                dirLight.shadow.mapSize.width = PERFORMANCE_CONFIG.shadowMapSize;
                dirLight.shadow.mapSize.height = PERFORMANCE_CONFIG.shadowMapSize;
                scene.add(dirLight);
                
                // Hemisphere light for better ambient lighting
                const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x444444, 0.4);
                scene.add(hemiLight);
            }
            
            // ========================================
            // STEP 4: Ground Plane (Conditional)
            // ========================================
            if (!shouldOptimizeForMobile) {
                const groundGeometry = new THREE.PlaneGeometry(100, 100);
                const groundMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x808080,
                    roughness: 0.8,
                    metalness: 0.2
                });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                scene.add(ground);
            }
            
            // ========================================
            // STEP 5: Load GLB Model
            // ========================================
            loadModel();
            
            // ========================================
            // STEP 6: Controls Setup
            // ========================================
            setupControls();
            
            // ========================================
            // STEP 7: Event Listeners
            // ========================================
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            
            // Show controls hint after loading
            setTimeout(() => {
                document.getElementById('controls-hint').classList.add('visible');
                setTimeout(() => {
                    document.getElementById('controls-hint').classList.remove('visible');
                }, 5000);
            }, 2000);
            
            // Start animation loop
            animate();
        }
        
        // ========================================
        // STEP 8: Load GLB Model with Mobile Optimization
        // ========================================
        function loadModel() {
            // Get model URL from query parameter
            const urlParams = new URLSearchParams(window.location.search);
            const modelUrl = urlParams.get('model') || 'assets/models/classroom.glb';
            
            const loader = new THREE.GLTFLoader();
            const loadingScreen = document.getElementById('loading-screen');
            const progressFill = document.getElementById('progress-fill');
            const loadingText = document.getElementById('loading-text');
            
            // Add timeout for mobile devices
            const loadTimeout = shouldOptimizeForMobile ? 30000 : 60000; // 30s for mobile, 60s for desktop
            let timeoutId;
            
            const startTime = performance.now();
            
            // Set loading timeout
            timeoutId = setTimeout(() => {
                showError('Model loading timed out. Please check your connection and try again.');
            }, loadTimeout);
            
            loader.load(
                modelUrl,
                // onLoad callback
                function(gltf) {
                    clearTimeout(timeoutId);
                    const loadTime = performance.now() - startTime;
                    console.log(`Model loaded in ${Math.round(loadTime)}ms`);
                    
                    model = gltf.scene;
                    
                    // Mobile-optimized model processing
                    if (shouldOptimizeForMobile) {
                        optimizeModelForMobile(model);
                    } else {
                        // Enable shadows for desktop
                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        });
                    }
                    
                    // Center and scale model
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    
                    // Scale to reasonable size with mobile adjustment
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = (10 / maxDim) * PERFORMANCE_CONFIG.modelScale;
                    model.scale.multiplyScalar(scale);
                    
                    // Center the model
                    model.position.sub(center.multiplyScalar(scale));
                    
                    scene.add(model);
                    
                    // Setup animations if available (limit on mobile)
                    if (gltf.animations && gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(model);
                        const maxAnimations = shouldOptimizeForMobile ? 1 : gltf.animations.length;
                        
                        for (let i = 0; i < Math.min(maxAnimations, gltf.animations.length); i++) {
                            mixer.clipAction(gltf.animations[i]).play();
                        }
                    }
                    
                    // Hide loading screen
                    loadingScreen.classList.add('hidden');
                    
                    // Force garbage collection on mobile
                    if (shouldOptimizeForMobile && window.gc) {
                        setTimeout(() => window.gc(), 1000);
                    }
                    
                    console.log('Model loaded successfully', {
                        loadTime: Math.round(loadTime),
                        isMobile: shouldOptimizeForMobile,
                        triangles: renderer.info.render.triangles,
                        geometries: renderer.info.memory.geometries,
                        textures: renderer.info.memory.textures
                    });
                },
                // onProgress callback
                function(xhr) {
                    if (xhr.lengthComputable) {
                        const percentComplete = (xhr.loaded / xhr.total) * 100;
                        progressFill.style.width = percentComplete + '%';
                        loadingText.textContent = `Loading 3D Model... ${Math.round(percentComplete)}%`;
                        
                        // Show additional info for slow connections
                        if (shouldOptimizeForMobile && percentComplete < 50 && (performance.now() - startTime) > 10000) {
                            loadingText.textContent = `Loading 3D Model... ${Math.round(percentComplete)}% (Optimizing for mobile)`;
                        }
                    }
                },
                // onError callback
                function(error) {
                    clearTimeout(timeoutId);
                    console.error('Error loading model:', error);
                    
                    let errorMessage = 'Failed to load 3D model.';
                    if (shouldOptimizeForMobile) {
                        errorMessage += ' This may be due to limited device resources. Try refreshing the page or using a desktop browser.';
                    } else {
                        errorMessage += ' Please check the model file path and your internet connection.';
                    }
                    
                    showError(errorMessage);
                }
            );
        }
        
        // ========================================
        // STEP 9: First-Person Controls
        // ========================================
        function setupControls() {
            controls = new THREE.PointerLockControls(camera, document.body);
            
            // Click to enable controls
            document.body.addEventListener('click', () => {
                controls.lock();
            });
            
            controls.addEventListener('lock', () => {
                console.log('Controls locked');
            });
            
            controls.addEventListener('unlock', () => {
                console.log('Controls unlocked');
            });
            
            scene.add(controls.getObject());
        }
        
        // ========================================
        // STEP 10: Keyboard Input
        // ========================================
        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveForward = true;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveBackward = true;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveLeft = true;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveRight = true;
                    break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    isRunning = true;
                    break;
            }
        }
        
        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveForward = false;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveBackward = false;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveLeft = false;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveRight = false;
                    break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    isRunning = false;
                    break;
            }
        }
        
        // ========================================
        // STEP 11: Animation Loop with Mobile Optimization
        // ========================================
        let frameCount = 0;
        let lastFPSCheck = performance.now();
        let currentFPS = 60;
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = performance.now();
            
            // FPS monitoring for mobile optimization
            if (shouldOptimizeForMobile) {
                frameCount++;
                if (time - lastFPSCheck >= 1000) {
                    currentFPS = frameCount;
                    frameCount = 0;
                    lastFPSCheck = time;
                    
                    // Adjust quality based on FPS
                    if (currentFPS < 20 && renderer.getPixelRatio() > 1) {
                        renderer.setPixelRatio(Math.max(0.5, renderer.getPixelRatio() * 0.8));
                        console.log('Reduced pixel ratio for performance:', renderer.getPixelRatio());
                    }
                }
            }
            
            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;
                
                // Determine speed
                const speed = isRunning ? RUN_SPEED : WALK_SPEED;
                
                // Damping
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                
                // Movement direction
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();
                
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;
                
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }
            
            prevTime = time;
            
            // Update animations (throttle on mobile)
            if (mixer) {
                const animationDelta = shouldOptimizeForMobile ? 
                    Math.min(clock.getDelta(), 1/30) : // Cap at 30fps for mobile
                    clock.getDelta();
                mixer.update(animationDelta);
            }
            
            renderer.render(scene, camera);
        }
        
        // ========================================
        // STEP 12: Window Resize Handler
        // ========================================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ========================================
        // STEP 13: Error Handling
        // ========================================
        function showError(message) {
            const errorScreen = document.getElementById('error-screen');
            const errorMessage = document.getElementById('error-message');
            const loadingScreen = document.getElementById('loading-screen');
            
            loadingScreen.classList.add('hidden');
            errorScreen.classList.add('visible');
            errorMessage.textContent = message;
        }
        
        // ========================================
        // STEP 14: Communication with Flutter
        // ========================================
        window.addEventListener('message', (event) => {
            const data = event.data;
            
            if (data.type === 'updateModel') {
                // Handle model updates from Flutter
                console.log('Update model:', data.url);
            } else if (data.type === 'reset') {
                // Reset camera position
                camera.position.set(0, 1.6, 5);
            } else if (data.type === 'optimizeForMobile') {
                // Dynamic mobile optimization
                if (renderer) {
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));
                    if (model) {
                        optimizeModelForMobile(model);
                    }
                }
            } else if (data.type === 'contextLoss') {
                // Handle context loss notification from Flutter
                console.log('Context loss notification received from Flutter');
                if (renderer && renderer.domElement) {
                    // Simulate context loss event for testing
                    const event = new Event('webglcontextlost');
                    renderer.domElement.dispatchEvent(event);
                }
            } else if (data.type === 'contextRecovered') {
                // Handle context recovery notification from Flutter
                console.log('Context recovery notification received from Flutter:', data.capabilities);
                
                // Update performance settings based on recovered capabilities
                if (data.capabilities && data.capabilities.webgl2Support) {
                    console.log('WebGL 2.0 support confirmed after recovery');
                } else if (data.capabilities && data.capabilities.webgl1Support) {
                    console.log('WebGL 1.0 support confirmed after recovery');
                }
            } else if (data.type === 'qualityChange') {
                // Handle quality level changes from Flutter
                console.log('Quality change requested:', data.level, 'multiplier:', data.multiplier);
                
                if (renderer) {
                    // Adjust pixel ratio based on quality
                    const basePixelRatio = window.devicePixelRatio;
                    const adjustedPixelRatio = Math.min(basePixelRatio * data.multiplier, basePixelRatio);
                    renderer.setPixelRatio(adjustedPixelRatio);
                    
                    // Adjust other quality settings
                    if (data.multiplier < 0.5) {
                        // Low quality mode
                        if (model) {
                            optimizeModelForMobile(model);
                        }
                    }
                }
            }
        });
        
        // ========================================
        // Mobile Optimization Functions
        // ========================================
        function optimizeModelForMobile(model) {
            console.log('Optimizing model for mobile device');
            
            model.traverse((child) => {
                if (child.isMesh) {
                    // Disable shadows for performance
                    child.castShadow = false;
                    child.receiveShadow = false;
                    
                    // Optimize materials
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(mat => optimizeMaterial(mat));
                        } else {
                            optimizeMaterial(child.material);
                        }
                    }
                    
                    // Reduce geometry complexity if needed
                    if (child.geometry && child.geometry.attributes.position.count > 10000) {
                        console.log('High poly mesh detected, consider using LOD');
                    }
                }
            });
        }
        
        function optimizeMaterial(material) {
            // Reduce material complexity for mobile
            if (material.map) {
                // Reduce texture filtering for performance
                material.map.minFilter = THREE.LinearFilter;
                material.map.magFilter = THREE.LinearFilter;
                material.map.generateMipmaps = false;
            }
            
            // Disable expensive material features
            material.envMap = null;
            material.lightMap = null;
            material.aoMap = null;
            
            // Use simpler material types on mobile
            if (material.type === 'MeshStandardMaterial' || material.type === 'MeshPhysicalMaterial') {
                // Keep standard material but reduce complexity
                material.roughness = Math.max(material.roughness, 0.5);
                material.metalness = Math.min(material.metalness, 0.5);
            }
        }
        
        function setupPerformanceMonitoring() {
            let performanceWarningShown = false;
            
            setInterval(() => {
                const info = renderer.info;
                const memoryUsage = performance.memory ? performance.memory.usedJSHeapSize / 1048576 : 0; // MB
                
                // Monitor performance metrics
                if (info.render.triangles > 50000 && !performanceWarningShown) {
                    console.warn('High triangle count detected:', info.render.triangles);
                    performanceWarningShown = true;
                }
                
                // Monitor memory usage
                if (memoryUsage > 100) { // 100MB threshold
                    console.warn('High memory usage detected:', Math.round(memoryUsage), 'MB');
                    
                    // Suggest garbage collection
                    if (window.gc) {
                        window.gc();
                    }
                }
                
                // Log performance stats periodically
                if (shouldOptimizeForMobile) {
                    console.log('Performance stats:', {
                        triangles: info.render.triangles,
                        drawCalls: info.render.calls,
                        geometries: info.memory.geometries,
                        textures: info.memory.textures,
                        memoryMB: Math.round(memoryUsage),
                        fps: currentFPS
                    });
                }
            }, 10000); // Check every 10 seconds
        }
        
        // Error recovery for mobile devices
        function handleWebGLContextLoss() {
            renderer.domElement.addEventListener('webglcontextlost', (event) => {
                event.preventDefault();
                console.error('WebGL context lost');
                
                // Notify Flutter about context loss
                window.parent.postMessage({
                    type: 'webglContextLost',
                    timestamp: Date.now(),
                    reason: 'Context lost - likely due to memory pressure or driver issues'
                }, '*');
                
                showError('3D rendering context was lost. This may happen on mobile devices with limited memory. Attempting recovery...');
            });
            
            renderer.domElement.addEventListener('webglcontextrestored', () => {
                console.log('WebGL context restored');
                
                // Notify Flutter about context restoration
                window.parent.postMessage({
                    type: 'webglContextRestored',
                    timestamp: Date.now()
                }, '*');
                
                // Attempt to reinitialize
                try {
                    // Hide error screen if visible
                    const errorScreen = document.getElementById('error-screen');
                    errorScreen.classList.remove('visible');
                    
                    // Show loading screen
                    const loadingScreen = document.getElementById('loading-screen');
                    loadingScreen.classList.remove('hidden');
                    
                    // Reinitialize the scene
                    setTimeout(() => {
                        init();
                    }, 1000);
                } catch (e) {
                    console.error('Failed to reinitialize after context restoration:', e);
                    showError('Failed to recover from context loss. Please refresh the page.');
                }
            });
        }
        
        // Memory cleanup function
        function cleanupResources() {
            if (model) {
                model.traverse((child) => {
                    if (child.geometry) {
                        child.geometry.dispose();
                    }
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(mat => {
                                if (mat.map) mat.map.dispose();
                                mat.dispose();
                            });
                        } else {
                            if (child.material.map) child.material.map.dispose();
                            child.material.dispose();
                        }
                    }
                });
            }
            
            if (renderer) {
                renderer.dispose();
            }
        }
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', cleanupResources);
        
        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                init();
                handleWebGLContextLoss();
            });
        } else {
            init();
            handleWebGLContextLoss();
        }
    </script>
</body>
</html>
