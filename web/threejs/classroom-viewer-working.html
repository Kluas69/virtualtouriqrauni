<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Classroom Viewer - Working</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #4285F4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220, 53, 69, 0.95);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            display: none;
            z-index: 300;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            opacity: 0.9;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .control-item {
            margin: 4px 0;
            display: flex;
            align-items: center;
        }
        
        .control-key {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            #controls {
                font-size: 10px;
                padding: 10px;
                top: 10px;
                left: 10px;
            }
            
            #status {
                bottom: 10px;
                left: 10px;
                font-size: 10px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading 3D Classroom...</div>
        <div id="progress" style="margin-top: 10px; font-size: 14px;">0%</div>
    </div>
    
    <div id="controls">
        <div style="font-weight: bold; margin-bottom: 8px;">🎮 Controls</div>
        <div class="control-item">
            <span class="control-key">Click</span>
            <span>Enter first-person mode</span>
        </div>
        <div class="control-item">
            <span class="control-key">WASD</span>
            <span>Move around</span>
        </div>
        <div class="control-item">
            <span class="control-key">Shift</span>
            <span>Run</span>
        </div>
        <div class="control-item">
            <span class="control-key">ESC</span>
            <span>Exit first-person</span>
        </div>
    </div>
    
    <div id="status">Ready to explore</div>
    
    <div id="error">
        <h3>❌ Loading Error</h3>
        <div id="error-message"></div>
        <button onclick="location.reload()" style="margin-top: 15px; padding: 8px 16px; background: #fff; color: #dc3545; border: none; border-radius: 4px; cursor: pointer;">Retry</button>
    </div>

    <!-- Performance Configuration -->
    <script src="../performance-config.js"></script>
    
    <!-- Load Three.js from CDN using the same approach as the working test -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js",
                "three/examples/jsm/controls/PointerLockControls.js": "https://unpkg.com/three@0.158.0/examples/jsm/controls/PointerLockControls.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/examples/jsm/controls/PointerLockControls.js';

        // Global variables
        let scene, camera, renderer, controls;
        let clock = new THREE.Clock();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let isRunning = false;
        let isInitialized = false; // Prevent multiple initializations

        // DOM elements
        const container = document.getElementById('container');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const errorDiv = document.getElementById('error');
        const errorMessage = document.getElementById('error-message');

        function init() {
            // Prevent multiple initializations
            if (isInitialized) {
                console.log('⚠️ Already initialized, skipping...');
                return;
            }
            
            console.log('🚀 Initializing 3D Classroom Viewer (Working Version)...');
            updateStatus('Initializing Three.js engine...');

            try {
                // Create scene
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB); // Sky blue

                // Create camera
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 1.6, 5); // Eye level

                // Create renderer
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true,
                    powerPreference: 'high-performance'
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio for performance
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.outputColorSpace = THREE.SRGBColorSpace;
                container.appendChild(renderer.domElement);

                // Add lighting
                setupLighting();

                // Setup controls
                setupControls();

                // Load the classroom model
                loadClassroomModel();

                // Handle window resize
                window.addEventListener('resize', onWindowResize);

                // Start render loop
                animate();

                console.log('✅ 3D Classroom Viewer initialized');
                isInitialized = true; // Mark as initialized
            } catch (error) {
                console.error('❌ Initialization failed:', error);
                showError('Failed to initialize 3D viewer: ' + error.message);
            }
        }

        function setupLighting() {
            updateStatus('Setting up lighting...');

            // Ambient light for overall illumination
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // Directional light (main light source)
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            
            // Optimize shadow map for performance
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            directionalLight.shadow.camera.left = -20;
            directionalLight.shadow.camera.right = 20;
            directionalLight.shadow.camera.top = 20;
            directionalLight.shadow.camera.bottom = -20;
            scene.add(directionalLight);

            // Hemisphere light for better ambient lighting
            const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x444444, 0.4);
            scene.add(hemisphereLight);

            console.log('✅ Lighting setup complete');
        }

        function setupControls() {
            updateStatus('Setting up controls...');

            // Pointer lock controls for first-person navigation
            controls = new PointerLockControls(camera, document.body);

            // Click to enable controls
            container.addEventListener('click', () => {
                if (!controls.isLocked) {
                    controls.lock();
                }
            });

            controls.addEventListener('lock', () => {
                console.log('🔒 First-person mode activated');
                updateStatus('First-person mode - Use WASD to move');
            });

            controls.addEventListener('unlock', () => {
                console.log('🔓 First-person mode deactivated');
                updateStatus('Click to enter first-person mode');
            });

            // Keyboard event listeners
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            console.log('✅ Controls setup complete');
        }

        function loadClassroomModel() {
            updateStatus('Loading classroom model...');
            console.log('📦 Loading classroom.glb...');

            const loader = new GLTFLoader();
            
            // Progress tracking
            const onProgress = (progressEvent) => {
                if (progressEvent.lengthComputable) {
                    const percentComplete = (progressEvent.loaded / progressEvent.total) * 100;
                    progress.textContent = Math.round(percentComplete) + '%';
                    console.log('📊 Loading progress:', Math.round(percentComplete) + '%');
                }
            };

            // Error handling
            const onError = (error) => {
                console.error('❌ Model loading error:', error);
                console.error('❌ Error details:', {
                    message: error.message,
                    stack: error.stack,
                    path: modelPaths[currentPathIndex - 1] || 'unknown'
                });
                hideLoading();
                showError(`Failed to load classroom model from all paths. Error: ${error.message}`);
            };

            // Success handling
            const onLoad = (gltf) => {
                console.log('✅ Classroom model loaded successfully!');
                
                try {
                    const model = gltf.scene;
                    
                    // Center and scale the model
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    
                    // Center the model
                    model.position.sub(center);
                    
                    // Scale if necessary
                    const maxDimension = Math.max(size.x, size.y, size.z);
                    if (maxDimension > 20) {
                        const scale = 20 / maxDimension;
                        model.scale.setScalar(scale);
                        console.log('📏 Model scaled by factor:', scale.toFixed(2));
                    }
                    
                    // Enable shadows and optimize materials
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            
                            // Optimize materials for performance
                            if (child.material) {
                                if (Array.isArray(child.material)) {
                                    child.material.forEach(mat => {
                                        if (mat.map) mat.map.generateMipmaps = false;
                                    });
                                } else {
                                    if (child.material.map) child.material.map.generateMipmaps = false;
                                }
                            }
                        }
                    });
                    
                    // Add model to scene
                    scene.add(model);
                    
                    // Hide loading screen
                    hideLoading();
                    updateStatus('Classroom loaded! Click to explore');
                    
                    console.log('🎉 Classroom model successfully added to scene');
                    console.log('📊 Model statistics:', {
                        center: center,
                        size: size,
                        triangles: renderer.info.render.triangles
                    });

                    // Notify parent window (Flutter) that loading is complete
                    if (window.parent !== window) {
                        window.parent.postMessage({
                            type: 'classroomLoaded',
                            success: true,
                            timestamp: Date.now()
                        }, '*');
                    }
                    
                } catch (error) {
                    console.error('❌ Error processing loaded model:', error);
                    showError('Error processing 3D model: ' + error.message);
                }
            };

            // Try multiple model paths to ensure compatibility
            const modelPaths = [
                './public/assets/models/classroom.glb',
                './assets/models/classroom.glb',
                '../assets/models/classroom.glb',
                '/assets/models/classroom.glb',
                '/threejs/public/assets/models/classroom.glb',
                '/threejs/assets/models/classroom.glb'
            ];

            let currentPathIndex = 0;

            function tryLoadModel() {
                if (currentPathIndex >= modelPaths.length) {
                    onError(new Error('Model not found in any of the expected locations'));
                    return;
                }

                const currentPath = modelPaths[currentPathIndex];
                console.log(`🔍 Trying to load model from: ${currentPath}`);
                
                loader.load(
                    currentPath,
                    onLoad,
                    onProgress,
                    (error) => {
                        console.warn(`❌ Failed to load from ${currentPath}:`, error);
                        currentPathIndex++;
                        setTimeout(tryLoadModel, 100); // Small delay before trying next path
                    }
                );
            }

            tryLoadModel();
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveForward = true;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveBackward = true;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveLeft = true;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveRight = true;
                    break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    isRunning = true;
                    break;
                case 'Escape':
                    if (controls.isLocked) {
                        controls.unlock();
                    }
                    break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveForward = false;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveBackward = false;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveLeft = false;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveRight = false;
                    break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    isRunning = false;
                    break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Handle movement when controls are locked
            if (controls.isLocked) {
                const speed = isRunning ? 200 : 100;
                
                // Apply friction
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // Calculate movement direction
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // Apply movement
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                // Move the camera
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Prevent going below ground level
                if (camera.position.y < 0.5) {
                    camera.position.y = 0.5;
                }
            }

            // Render the scene
            renderer.render(scene, camera);
        }

        function updateStatus(message) {
            status.textContent = message;
            console.log('📋 Status:', message);
        }

        function hideLoading() {
            loading.classList.add('hidden');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorDiv.style.display = 'block';
            hideLoading();
        }

        // Handle messages from parent window (Flutter)
        window.addEventListener('message', (event) => {
            console.log('📨 Received message from parent:', event.data);
            
            if (event.data.type === 'resetCamera') {
                camera.position.set(0, 1.6, 5);
                camera.lookAt(0, 1, 0);
                if (controls.isLocked) {
                    controls.unlock();
                }
                updateStatus('Camera position reset');
            }
        });

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Export for debugging
        window.classroomViewer = {
            scene,
            camera,
            renderer,
            controls,
            resetCamera: () => {
                camera.position.set(0, 1.6, 5);
                camera.lookAt(0, 1, 0);
                if (controls && controls.isLocked) {
                    controls.unlock();
                }
            }
        };
    </script>
</body>
</html>
