<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRA University - 3D Virtual Tour</title>
    <meta name="description" content="Immersive 3D virtual tour of IQRA University campus powered by Three.js">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            user-select: none;
        }
        
        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .loading-progress {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .loading-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* UI Overlay */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .ui-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            pointer-events: auto;
        }
        
        #controls-panel {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        
        #performance-panel {
            top: 20px;
            right: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        #navigation-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* Controls Hint */
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        #controls-hint.visible {
            opacity: 1;
        }
        
        /* Error Screen */
        #error-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
            padding: 40px;
        }
        
        #error-screen.visible {
            display: flex;
        }
        
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        
        .error-message {
            font-size: 16px;
            opacity: 0.8;
            max-width: 600px;
            line-height: 1.5;
        }
        
        .error-actions {
            margin-top: 30px;
        }
        
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin: 0 8px;
            transition: background 0.2s ease;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .btn-secondary {
            background: #666;
        }
        
        .btn-secondary:hover {
            background: #555;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .ui-panel {
                padding: 12px;
                font-size: 14px;
            }
            
            #controls-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                min-width: auto;
            }
            
            #performance-panel {
                display: none;
            }
            
            .loading-progress {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Canvas Container -->
        <div id="canvas-container"></div>
        
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading 3D Environment...</div>
            <div class="loading-progress">
                <div class="loading-progress-fill"></div>
            </div>
        </div>
        
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <!-- Controls Panel -->
            <div id="controls-panel" class="ui-panel">
                <h3 style="margin-bottom: 12px;">Controls</h3>
                <div style="font-size: 12px; line-height: 1.4;">
                    <div><strong>WASD:</strong> Move</div>
                    <div><strong>Mouse:</strong> Look around</div>
                    <div><strong>Shift:</strong> Run</div>
                    <div><strong>Click:</strong> Enter first-person mode</div>
                </div>
            </div>
            
            <!-- Performance Panel -->
            <div id="performance-panel" class="ui-panel">
                <div id="performance-stats"></div>
            </div>
            
            <!-- Navigation Panel -->
            <div id="navigation-panel" class="ui-panel">
                <div id="room-selector"></div>
            </div>
        </div>
        
        <!-- Controls Hint -->
        <div id="controls-hint">
            <strong>Controls:</strong> WASD to move • Mouse to look around • Shift to run
        </div>
        
        <!-- Error Screen -->
        <div id="error-screen">
            <div class="error-icon">⚠️</div>
            <div class="error-title">Unable to Load 3D Environment</div>
            <div class="error-message" id="error-message"></div>
            <div class="error-actions">
                <button class="btn" onclick="window.location.reload()">Retry</button>
                <button class="btn btn-secondary" onclick="window.history.back()">Go Back</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
